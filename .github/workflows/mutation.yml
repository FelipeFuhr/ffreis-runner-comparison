name: Mutation Testing (mutmut)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run (optional)"
        required: false
        type: string
  schedule:
    - cron: "0 2 1 * *"   # 1st of every month, 02:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mutation:
    if: ${{ !github.event.pull_request.draft }}
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-mutation.yml@1ce012b023b91e4c293846af4cfd93062d36d1be
    with:
      python-version: "3.11"
      uv-extras: "dev"
      paths-to-mutate: "orchestrator workloads"
      threshold: 80

  notify-failure:
    needs: [mutation]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ [CI] ${context.workflow} failed (${new Date().toISOString().split('T')[0]})`,
              body: [
                `**Workflow:** ${context.workflow}`,
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              ].join('\n'),
            });
