name: Lock Sync

on:
  pull_request:
    branches: [ main ]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/lock-sync.yml"
  push:
    branches: [ main ]
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/lock-sync.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lock-sync:
    uses: FelipeFuhr/ffreis-workflows-python/.github/workflows/python-lock-sync.yml@v1.0.1
    with:
      python-version: "3.11"
